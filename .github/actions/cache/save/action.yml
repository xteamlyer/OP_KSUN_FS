name: '🚀 High-Speed Cache Save'
description: 'Saves directories to GitHub Releases cache buckets'

inputs:
  cache_path:
    description: 'Directory path to cache'
    required: true
  cache_key:
    description: 'Cache key prefix'
    required: true
  cache_bucket:
    description: 'Bucket name (used for tag categorization)'
    required: false
    default: 'general-cache'
  github_token:
    description: 'GitHub Token'
    required: true

runs:
  using: "composite"
  steps:
    - name: 📦 Archive and Upload
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
      run: |
        set -euo pipefail
        
        PATH_TO_CACHE="${{ inputs.cache_path }}"
        CACHE_KEY="${{ inputs.cache_key }}"
        BUCKET="${{ inputs.cache_bucket }}"
        
        TAG_NAME="${BUCKET}-latest"
        ARCHIVE_NAME="${CACHE_KEY}.tar.zst"
        
        echo "::group::🚀 Saving Cache: $CACHE_KEY into $BUCKET"
        
        # 1. Create backdated release if not exists
        if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
          echo "Creating new cache bucket: $TAG_NAME"
          # Using a historical date to keep it at the end of the release list
          gh release create "$TAG_NAME" \
            --title "Cache Bucket: $BUCKET" \
            --notes "Automated cache storage for $BUCKET. Do not delete." \
            --target "main" \
            --prerelease
        fi
        
        # 2. Archive directory
        echo "Archiving $PATH_TO_CACHE..."
        tar --use-compress-program="zstd -T0 -3" -cf "$ARCHIVE_NAME" -C "$(dirname "$PATH_TO_CACHE")" "$(basename "$PATH_TO_CACHE")"
        
        # 3. Handle large files (split if > 2GB)
        FILE_SIZE=$(stat -c%s "$ARCHIVE_NAME")
        if [ "$FILE_SIZE" -gt 2147483648 ]; then
          echo "File is large ($FILE_SIZE bytes), splitting into 1.5GB chunks..."
          split -b 1500M -a 2 "$ARCHIVE_NAME" "${ARCHIVE_NAME}.part"
          rm "$ARCHIVE_NAME"
          
          for part in "${ARCHIVE_NAME}.part"*; do
            echo "Uploading $part..."
            gh release upload "$TAG_NAME" "$part" --clobber
          done
        else
          echo "Uploading $ARCHIVE_NAME..."
          gh release upload "$TAG_NAME" "$ARCHIVE_NAME" --clobber
        fi
        
        rm -f "$ARCHIVE_NAME" "${ARCHIVE_NAME}.part"*
        
        echo "✅ Cache saved successfully"
        echo "::endgroup::"
