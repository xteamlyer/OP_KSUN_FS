name: 🔨 Build and Release OnePlus Kernels

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      custom_release_tag:
        description: 'Provide a custom release tag (e.g., v2.0.0). Leave empty to auto-generate.'
        required: false
        type: string
        default: ''
      op_model:
        description: 'Select the OnePlus Devices to build'
        required: true
        type: choice
        options:
          - All
          - OP-ACE
          - OP-ACE-2
          - OP-ACE-2-PRO
          - OP-ACE-2V
          - OP-ACE-3
          - OP-ACE-3-PRO
          - OP-ACE-3V
          - OP-ACE-5
          - OP-ACE-5-PRO
          - OP-ACE-5-RACE
          - OP-ACE-5-ULTRA
          - OP-ACE-6
          - OP-ACE-6-ULTRA
          - OP-ACE-6T
          - OP-ACE-RACE
          - OP-NORD-3
          - OP-NORD-4
          - OP-NORD-4-CE
          - OP-NORD-5
          - OP-NORD-CE-5
          - OP-NORD-CE4-LITE
          - OP-OPEN
          - OP-PAD-2-MT6991
          - OP-PAD-2-PRO
          - OP-PAD-2-SM8650
          - OP-PAD-3-MT6897
          - OP-PAD-3-SM8750
          - OP-PAD-GO-2
          - OP-PAD-LITE
          - OP-PAD-MT6983
          - OP-PAD-PRO
          - OP10pro
          - OP10r
          - OP10t
          - OP11
          - OP11r
          - OP12
          - OP12r
          - OP13
          - OP13-CPH
          - OP13-PJZ
          - OP13S
          - OP13T
          - OP13r
          - OP15
          - OP15r
          - OP15T
          - OP-TURBO-6
          - OP-TURBO-6V
        default: All
      android_version_filter:
        description: 'Select the Android Version to build'
        required: true
        type: choice
        options:
          - All
          - A14
          - A15
          - A16
          - A14+A15
          - A15+A16
          - A14+A16
        default: All
      kernel_version_filter:
        description: 'Select the Kernel Version to build'
        required: true
        type: choice
        options:
          - All
          - android12-5.10
          - android13-5.15
          - android14-6.1
          - android15-6.6
          - android16-6.12
        default: All
      ksu_options:
        description: 'Enter KernelSU build json'
        required: true
        type: string
        default: '[{"type":"ksun","hash":"dev"}]'
      enable_wireguard:
        description: '🛂 Global Master Switch: Enable WireGuard for all models'
        required: true
        type: boolean
        default: false
      enable_battery_opt:
        description: '🔋 Global Master Switch: Enable Battery Optimization for all models'
        required: true
        type: boolean
        default: false
      enable_ntsync:
        description: '🕹️ Global Master Switch: Enable NTSync for all models'
        required: true
        type: boolean
        default: false
      optimize_level:
        description: "Compiler optimization level"
        required: true
        type: choice
        options: [O2, O3]
        default: O2
      clean_build:
        description: 'Clean build (no ccache)'
        type: boolean
        default: false
      sync_toolchains:
        description: 'Do you want to sync toolchains before build? [99% runs not required]'
        required: true
        type: boolean
        default: false
      debug:
        description: 'Enable debug mode: dumping debug related artifacts and show some debug logs'
        required: false
        type: boolean
        default: false
      make_release:
        description: 'Create a GitHub Release'
        type: boolean
        default: false
      build_timestamp:
        description: 'Custom kernel build timestamp for uname -a (e.g. "Tue Feb 10 10:01:02 UTC 2026"). Leave empty for current time.'
        type: string
        default: ''
      workflow_mode:
        description: 'Select the workflow mode'
        required: true
        type: choice
        options:
          - 'Build & Release'
          - 'Release Only'
        default: 'Build & Release'
      run_id_to_release:
        description: 'Run ID to pull artifacts from (Only for "Release Only" mode)'
        required: false
        type: string
        default: ''
      custom_changelog:
        description: 'Custom changelog for the release (Optional, overrides auto-gen)'
        required: false
        type: string
        default: ''
      android12-5_10_susfs_branch_or_commit:
        description: 'Enter SusFS Branch or commit hash for android12-5.10'
        type: string
        default: '4003ecf2d01c6d13fa8edf6c4f2607365738dc3d'      
      android13-5_15_susfs_branch_or_commit:
        description: 'Enter SusFS Branch or commit hash for android13-5.15'
        type: string
        default: '65ea8683c794cc309c3b0c4e6b57c1d972ca9a76'      
      android14-6_1_susfs_branch_or_commit:
        description: 'Enter SusFS Branch or commit hash for android14-6.1'
        type: string
        default: '52eaf3b8fa50207af2ce4f78d73729dc9e1303ea'
      android15-6_6_susfs_branch_or_commit:
        description: 'Enter SusFS Branch or commit hash for android15-6.6'
        type: string
        default: 'a8c720c42ca46fca13179280b13aa13c9fbe1562'
      android16-6_12_susfs_branch_or_commit:
        description: 'Enter SusFS Branch or commit hash for android16-6.12'
        type: string
        default: '72bdce7ce2de8189efb227c6cefbc578a9efd479'

jobs:
  set-op-model:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      matrix_A14: ${{ steps.set-matrix.outputs.matrix_A14 }}
      matrix_A15: ${{ steps.set-matrix.outputs.matrix_A15 }}
      matrix_A16: ${{ steps.set-matrix.outputs.matrix_A16 }}
      device_count: ${{ steps.set-matrix.outputs.count }}
      active_gki_keys: ${{ steps.set-matrix.outputs.active_gki_keys }}
      susfs_hash_android12_5_10: ${{ steps.set-matrix.outputs.susfs_hash_android12_5_10 }}
      susfs_hash_android13_5_15: ${{ steps.set-matrix.outputs.susfs_hash_android13_5_15 }}
      susfs_hash_android14_6_1:  ${{ steps.set-matrix.outputs.susfs_hash_android14_6_1 }}
      susfs_hash_android15_6_6:  ${{ steps.set-matrix.outputs.susfs_hash_android15_6_6 }}
      susfs_hash_android16_6_12: ${{ steps.set-matrix.outputs.susfs_hash_android16_6_12 }}
      ksu_resolved_hash:    ${{ steps.set-matrix.outputs.ksu_resolved_hash }}
      ksu_options_normalized: ${{ steps.set-matrix.outputs.ksu_options_normalized }}
      susfs_base_version: ${{ steps.set-matrix.outputs.susfs_base_version }}
    env:
      GH_TOKEN: ${{ github.token }}
      GH_HTTP_TIMEOUT: 600
    steps:
      - name: 📥 Checkout Code (to access configs/)
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            configs/
          sparse-checkout-cone-mode: false

      - name: 🔍 Generate build matrix
        id: set-matrix
        shell: bash
        run: |
          set -euo pipefail
          echo "::group::Matrix generation"
          
          input="${{ github.event.inputs.op_model }}"
          ksu_options_raw='${{ github.event.inputs.ksu_options }}'
          if ! ksu_options_normalized=$(echo "$ksu_options_raw" | jq -c 'map(if .type then .type |= ascii_upcase | if .hash == null then if .type == "KSUN" then .hash = "dev" elif .type == "KSU" then .hash = "main" else .hash end else . end else error("No type found") end)' 2>&1); then
            echo "::error::ksu_options validation failed: $ksu_options_normalized"
            exit 1
          fi
          
          echo "ksu_options_normalized=$ksu_options_normalized" >> $GITHUB_OUTPUT
          
          echo "[" > matrix.json
          mapfile -t all_json_files < <(find configs/ -name "*.json" -print0 | xargs -0 -n1)
          for i in "${!all_json_files[@]}"; do
            file="${all_json_files[$i]}"
            if [ -f "$file" ]; then
              jq -r '.' "$file" >> matrix.json
              if [ $((i+1)) -lt ${#all_json_files[@]} ]; then
                echo "," >> matrix.json
              fi
            fi
          done
          echo "]" >> matrix.json
          
          jq_filter="."
          
          case "$input" in
            All)
              ;;
            *)
              echo "ℹ️  Device-specific filter applied: $input"
              jq_filter="map(select(.model == \"$input\"))"
              ;;
          esac
          
          android_input="${{ github.event.inputs.android_version_filter }}"
          android_jq_filter=""
          
          case "$android_input" in
            "All")
              # No additional filtering needed
              ;;
            "A14")
              android_jq_filter=" | map(select(.os_version == \"A14\"))"
              ;;
            "A15")
              android_jq_filter=" | map(select(.os_version == \"A15\"))"
              ;;
            "A16")
              android_jq_filter=" | map(select(.os_version == \"A16\"))"
              ;;
            "A14+A15" | "A15+A14")
              android_jq_filter=" | map(select(.os_version == \"A14\" or .os_version == \"A15\"))"
              ;;
            "A15+A16" | "A16+A15")
              android_jq_filter=" | map(select(.os_version == \"A15\" or .os_version == \"A16\"))"
              ;;
            "A14+A16" | "A16+A14")
              android_jq_filter=" | map(select(.os_version == \"A14\" or .os_version == \"A16\"))"
              ;;
            *)
              echo "::warning::Unknown Android version filter '$android_input'."
              ;;
          esac

          kernel_input="${{ github.event.inputs.kernel_version_filter }}"
          kernel_jq_filter=""
          
          if [[ "$kernel_input" != "All" ]]; then
            IFS='-' read -r ak_android ak_kernel <<< "$kernel_input"
            kernel_jq_filter=" | map(select(.android_version == \"$ak_android\" and .kernel_version == \"$ak_kernel\"))"
            echo "ℹ️  Kernel version filter applied: $kernel_input"
          fi

          combined_filter="${jq_filter}${android_jq_filter}${kernel_jq_filter}"
          filtered=$(jq -c "$combined_filter" matrix.json)
          count=$(jq 'length' <<<"$filtered")
          
          if [ "$count" -eq 0 ]; then
            echo "::error::No config files found for input '$input' after applying filters!"
            echo ""
            echo "Available configurations:"
            jq -r '.[] | "  - \(.model) (\(.os_version), \(.android_version)-\(.kernel_version))"' matrix.json
            exit 1
          fi
          
          echo "$filtered" | jq '.' > matrix.json
          
          # For each device + each ksu option → one combined entry
          merged_matrix=$(jq -n --argjson devices "$filtered" --argjson ksu_list "$ksu_options_normalized" \
            '[ $devices[] as $dev | $ksu_list[] as $ksu | ($dev + {ksu_type: $ksu.type, ksu_hash: $ksu.hash}) ]')
          
          # Sort matrix by OOS version (A16 -> A15 -> A14)
          merged_matrix=$(echo "$merged_matrix" | jq -c 'sort_by(.os_version) | reverse')
          
          final_count=$(echo "$merged_matrix" | jq 'length')
          
          echo "✅ Found $final_count device(s) to build"
          echo ""
          echo "Selected devices (Sorted by OOS version):"
          jq -r '.[] | "  - \(.model) (\(.os_version), \(.android_version)-\(.kernel_version), \(.ksu_type) - \(.ksu_hash))"' <<<"$merged_matrix"
          
          echo "count=$final_count" >> "$GITHUB_OUTPUT"
          
          ksu_type=$(echo "$ksu_options_normalized" | jq -r '.[0].type')
          ksu_ref=$(echo "$ksu_options_normalized" | jq -r '.[0].hash')
          
          if [ "$ksu_type" == "KSUN" ]; then
            KSU_REPO_OWNER="KernelSU-Next"
            KSU_REPO_NAME="KernelSU-Next"
          else
            KSU_REPO_OWNER="tiann"
            KSU_REPO_NAME="KernelSU"
          fi
          
          HEAD_REF="refs/heads/${ksu_ref}"
          TAG_REF="refs/tags/${ksu_ref}"
          
          QUERY='query($owner: String!, $name: String!, $headRef: String!, $tagRef: String!, $objRef: String!) {
            repository(owner: $owner, name: $name) {
              hb: ref(qualifiedName: $headRef) { t: target { ... on Commit { o: oid } } }
              ht: ref(qualifiedName: $tagRef) { t: target { ... on Commit { o: oid } } }
              ho: object(expression: $objRef) { ... on Commit { o: oid } }
            }
          }'
          
          MAX_RETRIES=3
          RETRY_COUNT=0
          RETRY_DELAY=5 # Seconds to wait between retries
          
          echo "Resolving $ksu_type hash ($ksu_ref)..."
          
          until [ $RETRY_COUNT -ge $MAX_RETRIES ]; do
            RESULT=$(gh api graphql -f query="$QUERY" -f owner="$KSU_REPO_OWNER" -f name="$KSU_REPO_NAME" -f headRef="$HEAD_REF" -f tagRef="$TAG_REF" -f objRef="$ksu_ref" 2>/dev/null)
            EXIT_CODE=$?
            
            if [ $EXIT_CODE -eq 0 ] && [ ! -z "$RESULT" ]; then
              echo "  ✅ API Success"
              break
            fi
            
            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "::warning::API failed (Attempt $RETRY_COUNT/$MAX_RETRIES). Retrying in ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
          done
          
          if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
            echo "::error::GitHub API unreachable. Cannot validate $ksu_ref"
            exit 1
          fi
          
          resolved_sha=$(echo "$RESULT" | jq -r '.data.repository | (.hb.t.o // .ht.t.o // .ho.o // "unknown")')
          
          if [ "$resolved_sha" == "unknown" ]; then
            echo "::error::Ref/Hash '$ksu_ref' does not exist in $KSU_REPO_OWNER/$KSU_REPO_NAME"
            exit 1
          fi
          
          echo "  ✅ Resolved: $ksu_type/$ksu_ref → $resolved_sha"
          echo "ksu_resolved_hash=$resolved_sha" >> "$GITHUB_OUTPUT"
          
          # Inject ksu_resolved_hash into each device in the matrix
          merged_matrix=$(echo "$merged_matrix" | jq  --arg resolved_sha "$resolved_sha" 'map(.ksu_resolved_hash = $resolved_sha)')
          
          # SUSFS hash fetch
          SUSFS_REPO="https://gitlab.com/simonpunk/susfs4ksu.git"
          GITLAB_PROJECT_PATH="simonpunk/susfs4ksu"
          
          declare -A default_branches=(
            ["android12-5.10"]="gki-android12-5.10"
            ["android13-5.15"]="gki-android13-5.15"
            ["android14-6.1"]="gki-android14-6.1"
            ["android15-6.6"]="gki-android15-6.6"
            ["android16-6.12"]="gki-android16-6.12"
          )
          
          declare -A user_inputs=(
            ["android12-5.10"]="${{ inputs.android12-5_10_susfs_branch_or_commit }}"
            ["android13-5.15"]="${{ inputs.android13-5_15_susfs_branch_or_commit }}"
            ["android14-6.1"]="${{ inputs.android14-6_1_susfs_branch_or_commit }}"
            ["android15-6.6"]="${{ inputs.android15-6_6_susfs_branch_or_commit }}"
            ["android16-6.12"]="${{ inputs.android16-6_12_susfs_branch_or_commit }}"
          )
          
          mapfile -t active_keys < <(
            echo "$merged_matrix" \
              | jq -r '.[] | select(.susfs == true) | "\(.android_version)-\(.kernel_version)"' \
              | sort -u
          )
          
          echo "🔍 Resolving SUSFS hashes for: ${active_keys[*]:-none}"
          
          declare -A susfs_hashes
          declare -A susfs_versions_per_key
          
          for key in "${active_keys[@]}"; do
            default_val="${default_branches[$key]}"
            user_val="${user_inputs[$key]:-$default_val}"
            
            # Build GraphQL query — include blob fetch only when releasing
            HASH_QUERY="{ project(fullPath: \"${GITLAB_PROJECT_PATH}\") { repository { ch: commit(ref: \"${user_val}\") { sha } } } }"
            RELEASE_QUERY="{ project(fullPath: \"${GITLAB_PROJECT_PATH}\") { repository { ch: commit(ref: \"${user_val}\") { sha } blobs(paths: [\"kernel_patches/include/linux/susfs.h\"], ref: \"${user_val}\") { nodes { rawBlob } } } } }"
            
            if [ "${{ inputs.make_release }}" = "true" ]; then
              GL_QUERY="$RELEASE_QUERY"
            else
              GL_QUERY="$HASH_QUERY"
            fi
            
            MAX_RETRIES=3
            RETRY_COUNT=0
            RETRY_DELAY=5
            resolved=""
            
            until [ $RETRY_COUNT -ge $MAX_RETRIES ]; do
              RESPONSE=$(curl -s --fail -G "https://gitlab.com/api/graphql" --data-urlencode "query=$GL_QUERY")
              EXIT_CODE=$?
              
              if [ $EXIT_CODE -eq 0 ] && [ -n "$RESPONSE" ]; then
                resolved=$(echo "$RESPONSE" | jq -r '.data.project.repository.ch.sha // empty')
                if [ -n "$resolved" ] && [ "$resolved" != "null" ]; then
                  echo "  ✅ Query for $key Success"
                  
                  if [ "${{ inputs.make_release }}" = "true" ]; then
                    extracted=$(echo "$RESPONSE" | jq -r '.data.project.repository.blobs.nodes[0].rawBlob // empty' | grep '#define SUSFS_VERSION' | awk -F'"' '{print $2}')
                    susfs_versions_per_key[$key]="${extracted:-unknown}"
                    echo "  ✅ $key → SUSFS_VERSION = ${extracted:-unknown}"
                  fi
                  
                  break
                fi
              fi
              
              RETRY_COUNT=$((RETRY_COUNT + 1))
              echo "::warning::GitLab GraphQL API failed (Attempt $RETRY_COUNT/$MAX_RETRIES). Retrying..."
              sleep $RETRY_DELAY
            done
            
            # Final Validation — SUSFS hash
            if [ -z "$resolved" ] || [ "$resolved" = "null" ]; then
              echo "::error::Could not resolve SUSFS ref '$user_val' for $key on GitLab."
              exit 1
            fi
            
            # Final Validation — SUSFS version
            if [ "${{ inputs.make_release }}" = "true" ] && [ "${susfs_versions_per_key[$key]:-unknown}" = "unknown" ]; then
              echo "::error::Could not extract SUSFS_VERSION from susfs.h for '$key' after $MAX_RETRIES attempts. Cannot proceed with release."
              exit 1
            fi
            
            susfs_hashes["$key"]="$resolved"
            echo "  ✅ Resolved: $key → $resolved"
          done
          
          # Write CSV list of active GKI versions
          active_gki_keys_csv=$(IFS=','; echo "${active_keys[*]:-}")
          echo "active_gki_keys=$active_gki_keys_csv" >> "$GITHUB_OUTPUT"
          
          # Write hash to GITHUB_OUTPUT
          echo "susfs_hash_android12_5_10=${susfs_hashes[android12-5.10]:-unknown}" >> "$GITHUB_OUTPUT"
          echo "susfs_hash_android13_5_15=${susfs_hashes[android13-5.15]:-unknown}" >> "$GITHUB_OUTPUT"
          echo "susfs_hash_android14_6_1=${susfs_hashes[android14-6.1]:-unknown}"   >> "$GITHUB_OUTPUT"
          echo "susfs_hash_android15_6_6=${susfs_hashes[android15-6.6]:-unknown}"   >> "$GITHUB_OUTPUT"
          echo "susfs_hash_android16_6_12=${susfs_hashes[android16-6.12]:-unknown}" >> "$GITHUB_OUTPUT"
          
          # SUSFS_VERSION — only when releasing
          if [ "${{ inputs.make_release }}" = "true" ]; then
            susfs_base_version="unknown"
            for key in "${active_keys[@]}"; do
              ver="${susfs_versions_per_key[$key]:-unknown}"
              if [ "$ver" != "unknown" ]; then
                susfs_base_version="$ver"
                break
              fi
            done
            
            if [ "$susfs_base_version" = "unknown" ]; then
              echo "::error::Could not extract SUSFS_VERSION from susfs.h for any active GKI key. Cannot proceed with release."
              exit 1
            fi
            
            # make_release=true: mismatch is a hard error — prevents wrong tag
            for key in "${active_keys[@]}"; do
              key_ver="${susfs_versions_per_key[$key]:-unknown}"
              if [ "$key_ver" != "$susfs_base_version" ]; then
                echo "::error::SUSFS version mismatch: '$key' has '$key_ver', expected '$susfs_base_version'. Align refs before releasing."
                exit 1
              fi
            done
            
            # Ensure v prefix for standardized versioning
            [[ "$susfs_base_version" != v* ]] && susfs_base_version="v$susfs_base_version"
            echo "susfs_base_version=$susfs_base_version" >> "$GITHUB_OUTPUT"
          fi
          
          # Inject susfs_resolved_hash into each device in the matrix
          susfs_hashes_json=$(jq -n \
            --arg a12 "${susfs_hashes[android12-5.10]:-unknown}" \
            --arg a13 "${susfs_hashes[android13-5.15]:-unknown}" \
            --arg a14 "${susfs_hashes[android14-6.1]:-unknown}" \
            --arg a15 "${susfs_hashes[android15-6.6]:-unknown}" \
            --arg a16 "${susfs_hashes[android16-6.12]:-unknown}" \
            '{
              "android12-5.10": $a12,
              "android13-5.15": $a13,
              "android14-6.1":  $a14,
              "android15-6.6":  $a15,
              "android16-6.12": $a16
            }')
          
          merged_matrix=$(echo "$merged_matrix" | jq \
            --argjson hashes "$susfs_hashes_json" \
            '[.[] | . + {susfs_resolved_hash: ($hashes["\(.android_version)-\(.kernel_version)"] // "unknown")}]')
          
          merged_matrix=$(echo "$merged_matrix" | jq '
            sort_by(
              (.os_version | gsub("A"; "") | tonumber? // 0) * -1,
              .model
            )
          ')
          
          # Split matrix by OOS version for better parallelism
          matrix_A16=$(echo "$merged_matrix" | jq -c 'map(select(.os_version == "A16")) | {include: .}')
          matrix_A15=$(echo "$merged_matrix" | jq -c 'map(select(.os_version == "A15")) | {include: .}')
          matrix_A14=$(echo "$merged_matrix" | jq -c 'map(select(.os_version == "A14")) | {include: .}')
          
          echo "matrix_A16=$matrix_A16" >> "$GITHUB_OUTPUT"
          echo "matrix_A15=$matrix_A15" >> "$GITHUB_OUTPUT"
          echo "matrix_A14=$matrix_A14" >> "$GITHUB_OUTPUT"
          
          # Maintain compatibility for existing job
          wrapped=$(jq -n --argjson items "$merged_matrix" '{ include: $items }')
          echo "matrix=$(jq -c . <<< "$wrapped")" >> "$GITHUB_OUTPUT"
          
          ksu_type=$(echo "$ksu_options_normalized" | jq -r '.[0].type')
          ksu_ref=$(echo "$ksu_options_normalized" | jq -r '.[0].hash')
          
          if [ "$ksu_type" == "KSUN" ]; then
            KSU_REPO_OWNER="KernelSU-Next"
            KSU_REPO_NAME="KernelSU-Next"
          else
            KSU_REPO_OWNER="tiann"
            KSU_REPO_NAME="KernelSU"
          fi
          
          HEAD_REF="refs/heads/${ksu_ref}"
          TAG_REF="refs/tags/${ksu_ref}"
          
          QUERY='query($owner: String!, $name: String!, $headRef: String!, $tagRef: String!, $objRef: String!) {
            repository(owner: $owner, name: $name) {
              hb: ref(qualifiedName: $headRef) { t: target { ... on Commit { o: oid } } }
              ht: ref(qualifiedName: $tagRef) { t: target { ... on Commit { o: oid } } }
              ho: object(expression: $objRef) { ... on Commit { o: oid } }
            }
          }'
          
          MAX_RETRIES=3
          RETRY_COUNT=0
          RETRY_DELAY=5 # Seconds to wait between retries
          
          echo "Resolving $ksu_type hash ($ksu_ref)..."
          
          until [ $RETRY_COUNT -ge $MAX_RETRIES ]; do
            RESULT=$(gh api graphql -f query="$QUERY" -f owner="$KSU_REPO_OWNER" -f name="$KSU_REPO_NAME" -f headRef="$HEAD_REF" -f tagRef="$TAG_REF" -f objRef="$ksu_ref" 2>/dev/null)
            EXIT_CODE=$?
            
            if [ $EXIT_CODE -eq 0 ] && [ ! -z "$RESULT" ]; then
              echo "  ✅ API Success"
              break
            fi
            
            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "::warning::API failed (Attempt $RETRY_COUNT/$MAX_RETRIES). Retrying in ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
          done
          
          if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
            echo "::error::GitHub API unreachable. Cannot validate $ksu_ref"
            exit 1
          fi
          
          resolved_sha=$(echo "$RESULT" | jq -r '.data.repository | (.hb.t.o // .ht.t.o // .ho.o // "unknown")')
          
          if [ "$resolved_sha" == "unknown" ]; then
            echo "::error::Ref/Hash '$ksu_ref' does not exist in $KSU_REPO_OWNER/$KSU_REPO_NAME"
            exit 1
          fi
          
          echo "  ✅ Resolved: $ksu_type/$ksu_ref → $resolved_sha"
          echo "ksu_resolved_hash=$resolved_sha" >> "$GITHUB_OUTPUT"
          
          
          # Inject ksu_resolved_hash into each device in the matrix
          merged_matrix=$(echo "$merged_matrix" | jq  --arg resolved_sha "$resolved_sha" 'map(.ksu_resolved_hash = $resolved_sha)')
          
          # SUSFS hash fetch
          SUSFS_REPO="https://gitlab.com/simonpunk/susfs4ksu.git"
          PROJECT_ID="simonpunk%2fsusfs4ksu"
          
          declare -A default_branches=(
            ["android12-5.10"]="gki-android12-5.10"
            ["android13-5.15"]="gki-android13-5.15"
            ["android14-6.1"]="gki-android14-6.1"
            ["android15-6.6"]="gki-android15-6.6"
            ["android16-6.12"]="gki-android16-6.12"
          )
          
          declare -A user_inputs=(
            ["android12-5.10"]="${{ inputs.android12-5_10_susfs_branch_or_commit }}"
            ["android13-5.15"]="${{ inputs.android13-5_15_susfs_branch_or_commit }}"
            ["android14-6.1"]="${{ inputs.android14-6_1_susfs_branch_or_commit }}"
            ["android15-6.6"]="${{ inputs.android15-6_6_susfs_branch_or_commit }}"
            ["android16-6.12"]="${{ inputs.android16-6_12_susfs_branch_or_commit }}"
          )
          
          mapfile -t active_keys < <(
            echo "$merged_matrix" \
              | jq -r '.[] | select(.susfs == true) | "\(.android_version)-\(.kernel_version)"' \
              | sort -u
          )
          
          echo "🔍 Resolving SUSFS hashes for: ${active_keys[*]:-none}"
          
          declare -A susfs_hashes
          for key in "${active_keys[@]}"; do
            default_val="${default_branches[$key]}"
            user_val="${user_inputs[$key]:-$default_val}"
            
            MAX_RETRIES=3
            RETRY_COUNT=0
            RETRY_DELAY=5
            resolved=""
            
            until [ $RETRY_COUNT -ge $MAX_RETRIES ]; do
              # We query the commit endpoint which accepts Branch, Tag, or SHA
              RESULT=$(curl -s --fail "https://gitlab.com/api/v4/projects/${PROJECT_ID}/repository/commits/${user_val}")
              EXIT_CODE=$?
              
              if [ $EXIT_CODE -eq 0 ] && [ -n "$RESULT" ]; then
                resolved=$(echo "$RESULT" | jq -r '.id')
                echo "  ✅ Query for $key input field Success"
                break
              fi
              
              RETRY_COUNT=$((RETRY_COUNT + 1))
              echo "::warning::GitLab API failed (Attempt $RETRY_COUNT/$MAX_RETRIES). Retrying..."
              sleep $RETRY_DELAY
            done
            
            # Final Validation
            if [ -z "$resolved" ] || [ "$resolved" = "null" ]; then
               echo "::error::Could not resolve SUSFS ref '$user_val' for $key on GitLab."
               exit 1
            fi
            
            susfs_hashes["$key"]="$resolved"
            echo "  ✅ Resolved: $key → $resolved"
          done
          
          # Write CSV list of active GKI versions
          active_gki_keys_csv=$(IFS=','; echo "${active_keys[*]:-}")
          echo "active_gki_keys=$active_gki_keys_csv" >> "$GITHUB_OUTPUT"
          
          # Write hash to GITHUB_OUTPUT
          echo "susfs_hash_android12_5_10=${susfs_hashes[android12-5.10]:-unknown}" >> "$GITHUB_OUTPUT"
          echo "susfs_hash_android13_5_15=${susfs_hashes[android13-5.15]:-unknown}" >> "$GITHUB_OUTPUT"
          echo "susfs_hash_android14_6_1=${susfs_hashes[android14-6.1]:-unknown}"   >> "$GITHUB_OUTPUT"
          echo "susfs_hash_android15_6_6=${susfs_hashes[android15-6.6]:-unknown}"   >> "$GITHUB_OUTPUT"
          echo "susfs_hash_android16_6_12=${susfs_hashes[android16-6.12]:-unknown}" >> "$GITHUB_OUTPUT"
          
          # Inject susfs_resolved_hash into each device in the matrix
          susfs_hashes_json=$(jq -n \
            --arg a12 "${susfs_hashes[android12-5.10]:-unknown}" \
            --arg a13 "${susfs_hashes[android13-5.15]:-unknown}" \
            --arg a14 "${susfs_hashes[android14-6.1]:-unknown}" \
            --arg a15 "${susfs_hashes[android15-6.6]:-unknown}" \
            --arg a16 "${susfs_hashes[android16-6.12]:-unknown}" \
            '{
              "android12-5.10": $a12,
              "android13-5.15": $a13,
              "android14-6.1":  $a14,
              "android15-6.6":  $a15,
              "android16-6.12": $a16
            }')
          
          merged_matrix=$(echo "$merged_matrix" | jq \
            --argjson hashes "$susfs_hashes_json" \
            '[.[] | . + {susfs_resolved_hash: ($hashes["\(.android_version)-\(.kernel_version)"] // "unknown")}]')
          
          # Recalculate wrapped with updated matrix and write output
          wrapped=$(jq -n --argjson items "$merged_matrix" '{ include: $items }')
          echo "matrix=$(jq -c . <<< "$wrapped")" >> "$GITHUB_OUTPUT"
          
          echo "::endgroup::"

      - name: Upload build matrix
        uses: actions/upload-artifact@v7
        with:
          name: build-matrix
          path: matrix.json
          archive: false
          retention-days: 7

      - name: 📊 Build plan summary
        run: |
          ksu_type="${{ fromJSON(steps.set-matrix.outputs.ksu_options_normalized)[0].type }}"
          ksu_ref="${{ fromJSON(steps.set-matrix.outputs.ksu_options_normalized)[0].hash }}"
          
          ksu_display=""
          if [ "$ksu_type" = "KSUN" ] || [ "$ksu_type" = "KSU" ]; then
            if [[ "$ksu_ref" =~ ^[0-9a-f]{40}$ ]]; then
              ksu_display+="📌 \`$ksu_type\`, \`$ksu_ref\`"
            else
              ksu_display+="🔀 \`$ksu_type\`, \`$ksu_ref\` (\`${{ steps.set-matrix.outputs.ksu_resolved_hash }}\`)"
            fi
          fi
          
          build_ts_input="${{ inputs.build_timestamp }}"
          if [ -z "$build_ts_input" ]; then
            build_ts_display="⏱️ auto (current build time)"
          else
            build_ts_display="📌 \`$build_ts_input\`"
          fi
          
          {
            cat << 'EOF'
          ## 🎯 Build Plan
          
          **Target:** ${{ inputs.op_model }}  
          **Devices:** ${{ steps.set-matrix.outputs.count }}  
          
          **Configuration:**
          EOF
          
            echo "- KSU Config: $ksu_display"
            echo "- Build Timestamp: $build_ts_display"
          
            cat << 'EOF'
          - Optimization: ${{ inputs.optimize_level }}
          - Clean Build/No Ccache: ${{ inputs.clean_build && '✅ Yes' || '❌ No' }}
          - Create Release: ${{ inputs.make_release && '✅ Yes' || '❌ No' }}
          - Create Debug Artifacts: ${{ inputs.debug && '✅ Yes' || '❌ No' }}
          
          **SUSFS Configuration:**
          EOF
          } >> "$GITHUB_STEP_SUMMARY"
          
          # Display SUSFS config for each kernel version
          declare -A susfs_inputs=(
            ["android12-5.10"]="${{ inputs.android12-5_10_susfs_branch_or_commit }}"
            ["android13-5.15"]="${{ inputs.android13-5_15_susfs_branch_or_commit }}"
            ["android14-6.1"]="${{ inputs.android14-6_1_susfs_branch_or_commit }}"
            ["android15-6.6"]="${{ inputs.android15-6_6_susfs_branch_or_commit }}"
            ["android16-6.12"]="${{ inputs.android16-6_12_susfs_branch_or_commit }}"
          )
          
          declare -A step_hashes=(
            ["android12-5.10"]="${{ steps.set-matrix.outputs.susfs_hash_android12_5_10 }}"
            ["android13-5.15"]="${{ steps.set-matrix.outputs.susfs_hash_android13_5_15 }}"
            ["android14-6.1"]="${{ steps.set-matrix.outputs.susfs_hash_android14_6_1 }}"
            ["android15-6.6"]="${{ steps.set-matrix.outputs.susfs_hash_android15_6_6 }}"
            ["android16-6.12"]="${{ steps.set-matrix.outputs.susfs_hash_android16_6_12 }}"
          )
          
          # Iterate only on the GKI versions present in this run
          IFS=',' read -ra active_keys_display \
            <<< "${{ steps.set-matrix.outputs.active_gki_keys }}"
          
          for key in "${active_keys_display[@]}"; do
            value="${susfs_inputs[$key]:-}"
            fetched_hash="${step_hashes[$key]:-unknown}"
            
            if [ -z "$value" ]; then
              # Auto: no input > hash resolved by ls-remote
              echo "- $key: 🔄 auto (\`$fetched_hash\`)" >> $GITHUB_STEP_SUMMARY
            elif [[ "$value" =~ ^[0-9a-f]{40}$ ]]; then
              # Manual 40-char hash > direct passthrough
              echo "- $key: 📌 \`$value\`" >> $GITHUB_STEP_SUMMARY
            else
              # Branch name > show branch + resolved hash
              echo "- $key: 🔀 \`$value\` (\`$fetched_hash\`)" >> $GITHUB_STEP_SUMMARY
            fi
          done
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> **💡 Note:** Hashes are resolved at run time via API calls before builds start." >> $GITHUB_STEP_SUMMARY
          
          # Add OOS restriction note for android-kernel filters
          if [[ "${{ inputs.op_model }}" == android*-*.* ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> **⚠️ Android-Kernel Filter:** Only A15 and A16 devices will be built for \`${{ inputs.op_model }}\`" >> $GITHUB_STEP_SUMMARY
          fi

  mirror_toolchain:
    needs: set-op-model
    if: ${{ inputs.sync_toolchains }}
    uses: ./.github/workflows/mirror-toolchains.yml
    secrets: inherit

  prepare_ccache:
    name: Prepare ccache binary (download once)
    runs-on: ubuntu-latest
    steps:
      - name: Download custom ccache once
        run: |
          set -uo pipefail
          echo "::group::Download ccache"
          url="https://github.com/cctv18/ccache-ECS/releases/download/ccache-ECS-v1.0/linux-x86_64-glibc-binary.zip"
          ok=0
          for attempt in 1 2 3 4 5 6; do
            if curl -LfsS --connect-timeout 30 --max-time 120 "$url" -o /tmp/ccache.zip && unzip -o /tmp/ccache.zip -d /tmp; then
              ok=1; break
            fi
            echo "attempt $attempt failed (504/throttle); backing off..."
            sleep $(( attempt * 5 + RANDOM % 6 ))
          done
          if [ "$ok" = 1 ]; then
            mv /tmp/ccache ./ccache
            echo "✅ downloaded ccache once for all matrix jobs"
          else
            echo "::warning::custom ccache download failed; matrix jobs will fall back to the apt ccache"
            rm -f ./ccache
          fi
          echo "::endgroup::"
      - name: Upload ccache artifact
        uses: actions/upload-artifact@v7
        with:
          name: ccache-binary
          path: ccache
          retention-days: 1
          if-no-files-found: warn

  build-A16:
    name: build-A16 (${{ matrix.model }}, ${{ matrix.ksu_type }})
    needs: [set-op-model, prepare_ccache, mirror_toolchain]
    if: |
      !cancelled() &&
      needs.set-op-model.result == 'success' &&
      (needs.mirror_toolchain.result == 'success' || needs.mirror_toolchain.result == 'skipped') &&
      inputs.workflow_mode == 'Build & Release' &&
      fromJSON(needs.set-op-model.outputs.matrix_A16).include[0] != null
    runs-on: ubuntu-latest
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      LDCACHE_DIR: ${{ github.workspace }}/.ld_cache
      CCACHE_LOGFILE: ${{ github.workspace }}/ccache.log
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.set-op-model.outputs.matrix_A16) }}
    timeout-minutes: 180
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v6
      - name: Get prebuilt ccache (downloaded once by prepare_ccache)
        uses: actions/download-artifact@v7
        with:
          name: ccache-binary
          path: ccache-dl
        continue-on-error: true
      - name: 🛠️ Set up ccache
        run: |
          if [ -f ccache-dl/ccache ]; then
            sudo cp ccache-dl/ccache /usr/local/bin/
            sudo chmod +x /usr/local/bin/ccache
            ccache --version
          else
            echo "::warning::ccache binary not found from artifact. Falling back to apt ccache."
            sudo apt-get -o Acquire::Retries=3 update -qq
            sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends ccache
            ccache --version
          fi
      - name: 🔨 Build Kernel
        uses: ./.github/actions/build-kernel
        with:
          op_config_json: ${{ toJSON(matrix) }}
          ksu_type: ${{ matrix.ksu_type }}
          ksu_branch_or_hash: ${{ matrix.ksu_resolved_hash }}
          susfs_commit_hash_or_branch: ${{ matrix.susfs_resolved_hash }}
          optimize_level: ${{ inputs.optimize_level }}
          build_timestamp: ${{ inputs.build_timestamp }}
          clean: ${{ inputs.clean_build }}
          debug: ${{ inputs.debug }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

  build-A15:
    name: build-A15 (${{ matrix.model }}, ${{ matrix.ksu_type }})
    needs: [set-op-model, prepare_ccache, mirror_toolchain]
    if: |
      !cancelled() &&
      needs.set-op-model.result == 'success' &&
      (needs.mirror_toolchain.result == 'success' || needs.mirror_toolchain.result == 'skipped') &&
      inputs.workflow_mode == 'Build & Release' &&
      fromJSON(needs.set-op-model.outputs.matrix_A15).include[0] != null
    runs-on: ubuntu-latest
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      LDCACHE_DIR: ${{ github.workspace }}/.ld_cache
      CCACHE_LOGFILE: ${{ github.workspace }}/ccache.log
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.set-op-model.outputs.matrix_A15) }}
    timeout-minutes: 180
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v6
      - name: Get prebuilt ccache (downloaded once by prepare_ccache)
        uses: actions/download-artifact@v7
        with:
          name: ccache-binary
          path: ccache-dl
        continue-on-error: true
      - name: 🛠️ Set up ccache
        run: |
          if [ -f ccache-dl/ccache ]; then
            sudo cp ccache-dl/ccache /usr/local/bin/
            sudo chmod +x /usr/local/bin/ccache
            ccache --version
          else
            echo "::warning::ccache binary not found from artifact. Falling back to apt ccache."
            sudo apt-get -o Acquire::Retries=3 update -qq
            sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends ccache
            ccache --version
          fi
      - name: 🔨 Build Kernel
        uses: ./.github/actions/build-kernel
        with:
          op_config_json: ${{ toJSON(matrix) }}
          ksu_type: ${{ matrix.ksu_type }}
          ksu_branch_or_hash: ${{ matrix.ksu_resolved_hash }}
          susfs_commit_hash_or_branch: ${{ matrix.susfs_resolved_hash }}
          optimize_level: ${{ inputs.optimize_level }}
          build_timestamp: ${{ inputs.build_timestamp }}
          clean: ${{ inputs.clean_build }}
          debug: ${{ inputs.debug }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

  build-A14:
    name: build-A14 (${{ matrix.model }}, ${{ matrix.ksu_type }})
    needs: [set-op-model, prepare_ccache, mirror_toolchain]
    if: |
      !cancelled() &&
      needs.set-op-model.result == 'success' &&
      (needs.mirror_toolchain.result == 'success' || needs.mirror_toolchain.result == 'skipped') &&
      inputs.workflow_mode == 'Build & Release' &&
      fromJSON(needs.set-op-model.outputs.matrix_A14).include[0] != null
    runs-on: ubuntu-latest
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      LDCACHE_DIR: ${{ github.workspace }}/.ld_cache
      CCACHE_LOGFILE: ${{ github.workspace }}/ccache.log
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.set-op-model.outputs.matrix_A14) }}
    timeout-minutes: 180
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v6
      - name: Get prebuilt ccache (downloaded once by prepare_ccache)
        uses: actions/download-artifact@v7
        with:
          name: ccache-binary
          path: ccache-dl
        continue-on-error: true
      - name: 🛠️ Set up ccache
        run: |
          if [ -f ccache-dl/ccache ]; then
            sudo cp ccache-dl/ccache /usr/local/bin/
            sudo chmod +x /usr/local/bin/ccache
            ccache --version
          else
            echo "::warning::ccache binary not found from artifact. Falling back to apt ccache."
            sudo apt-get -o Acquire::Retries=3 update -qq
            sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends ccache
            ccache --version
          fi
      - name: 🔨 Build Kernel
        uses: ./.github/actions/build-kernel
        with:
          op_config_json: ${{ toJSON(matrix) }}
          ksu_type: ${{ matrix.ksu_type }}
          ksu_branch_or_hash: ${{ matrix.ksu_resolved_hash }}
          susfs_commit_hash_or_branch: ${{ matrix.susfs_resolved_hash }}
          optimize_level: ${{ inputs.optimize_level }}
          build_timestamp: ${{ inputs.build_timestamp }}
          clean: ${{ inputs.clean_build }}
          debug: ${{ inputs.debug }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

  trigger-release:
    needs: [set-op-model, build-A16, build-A15, build-A14]
    runs-on: ubuntu-latest
    if: ${{ always() && inputs.make_release && !cancelled() && (inputs.workflow_mode == 'Release Only' || !failure()) }}
    environment: ${{ (github.ref_name == 'main' || github.ref_name == 'Beta-2' || github.ref_name == 'testing') && 'Production-Release' || '' }}
    env:
      REPO_OWNER: ${{ github.repository_owner }}
      REPO_NAME: ${{ github.event.repository.name }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SUSFS_BASE_VERSION: ${{ needs.set-op-model.outputs.susfs_base_version }}
      RELEASE_NAME: 'OnePlus Kernels With KernelSU Next & SUSFS ${{ needs.set-op-model.outputs.susfs_base_version }}'
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🏷️ Generate and Create New Tag
        run: |
          if [ -n "${{ github.event.inputs.custom_release_tag }}" ]; then
            NEW_TAG="${{ github.event.inputs.custom_release_tag }}"
            echo "✅ Using custom tag: $NEW_TAG"
          else
            # Get the absolute latest tag from the repository
            LATEST_TAG=$(gh api repos/$REPO_OWNER/$REPO_NAME/tags --jq '.[0].name' 2>/dev/null || true)
            
            if [ -z "$LATEST_TAG" ]; then
              # No existing tags → start at -r1 for the current version
              NEW_TAG="${SUSFS_BASE_VERSION}-r1"
            else
              echo "ℹ️ Last release tag: $LATEST_TAG"
              # Check if the last tag contains our current base SUSFS version
              if [[ "$LATEST_TAG" == *"$SUSFS_BASE_VERSION"* ]]; then
                if [[ "$LATEST_TAG" == *-r* ]]; then
                  # Increment Revision: v2.1.0-r1 -> v2.1.0-r2
                  BASE=$(echo "$LATEST_TAG" | awk -F'-r' '{print $1}')
                  REV=$(echo "$LATEST_TAG" | awk -F'-r' '{print $2}')
                  # Ensure REV is a number before incrementing
                  if [[ "$REV" =~ ^[0-9]+$ ]]; then
                    NEW_TAG="${BASE}-r$((REV + 1))"
                  else
                    NEW_TAG="${LATEST_TAG}-r1"
                  fi
                else
                  # Standard to Revision: v2.1.0 -> v2.1.0-r1
                  NEW_TAG="${LATEST_TAG}-r1"
                fi
              else
                # New SUSFS version or different base detected, reset to -r1
                NEW_TAG="${SUSFS_BASE_VERSION}-r1"
                echo "ℹ️ New version base detected, starting at -r1"
              fi
            fi
            echo "Auto-generated tag: $NEW_TAG"
          fi

          echo "New tag: $NEW_TAG"
          echo "NEW_TAG=${NEW_TAG}" >> $GITHUB_ENV
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag $NEW_TAG
          git push origin $NEW_TAG

      - name: 📥 Download Artifacts (Current Run)
        if: inputs.workflow_mode != 'Release Only'
        uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          path: ./downloaded-artifacts
          merge-multiple: true

      - name: 📥 Download Artifacts (Release Only)
        if: inputs.workflow_mode == 'Release Only'
        uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          path: ./downloaded-artifacts
          merge-multiple: true
          run-id: ${{ inputs.run_id_to_release }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📋 List Downloaded Artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          if [ -d "./downloaded-artifacts" ]; then
            find ./downloaded-artifacts -type f | sort
            echo "---"
            echo "Total zip files: $(find ./downloaded-artifacts -maxdepth 1 -name '*.zip' -type f | wc -l)"
          else
            echo "⚠️ downloaded-artifacts directory does not exist!"
          fi

      - name: 📝 Generate Device List and Final Release Notes
        id: generate-notes
        run: |
          echo "=== Start building the release notes ==="
          
          # Collect build metadata
          declare -A device_info
          
          # Check if matrix.json exists
          if [ -f "./downloaded-artifacts/matrix.json" ]; then
            JSON_BUILD_DATA=$(cat ./downloaded-artifacts/matrix.json)
          else
            JSON_BUILD_DATA="[]"
          fi
          
          for file in $(find downloaded-artifacts -maxdepth 1 -name "*.zip" -type f | sort); do
            if [ -f "$file" ]; then
              zipname=$(basename "$file" .zip)
              rest="${zipname#SKF_}"
              IFS='_' read -ra parts <<< "$rest"
              model="${parts[0]}"
              os_version="${parts[1]}"
              kernel_version="${parts[2]}"
              ksu_type="${parts[3]}"
              ksu_ver="${parts[4]}"
              if [ "${parts[5]:-}" = "SuSFS" ]; then
                susfs_ver="${parts[6]:-unknown}"
              else
                susfs_ver="none"
              fi
              full_model="${model}_${os_version}_${kernel_version}"
              device_info["$full_model"]="$model|$os_version|$kernel_version|$ksu_type|$ksu_ver|$susfs_ver|$zipname"
            fi
          done
          
          ksu_type="${{ fromJSON(needs.set-op-model.outputs.ksu_options_normalized)[0].type }}"
          ksu_ref="${{ fromJSON(needs.set-op-model.outputs.ksu_options_normalized)[0].hash }}"
          ksu_resolved_hash="${{ needs.set-op-model.outputs.ksu_resolved_hash }}"
          
          OPTIMIZE_LEVEL="${{ inputs.optimize_level }}"
          CLEAN_BUILD="${{ inputs.clean_build }}"
          
          # Hash map for GKI version
          declare -A susfs_map=(
            ["android12-5.10"]="${{ needs.set-op-model.outputs.susfs_hash_android12_5_10 }}"
            ["android13-5.15"]="${{ needs.set-op-model.outputs.susfs_hash_android13_5_15 }}"
            ["android14-6.1"]="${{ needs.set-op-model.outputs.susfs_hash_android14_6_1 }}"
            ["android15-6.6"]="${{ needs.set-op-model.outputs.susfs_hash_android15_6_6 }}"
            ["android16-6.12"]="${{ needs.set-op-model.outputs.susfs_hash_android16_6_12 }}"
          )
          
          # List of GKI versions present in this run
          IFS=',' read -ra active_gki_keys \
            <<< "${{ needs.set-op-model.outputs.active_gki_keys }}"
          
          if [ ${#device_info[@]} -gt 0 ]; then
            first_entry=$(printf '%s\n' "${!device_info[@]}" | sort | head -n1)
            IFS='|' read -r _ _ _ _ ksu_ver_global _ _ <<< "${device_info[$first_entry]}"
          else
            ksu_ver_global="unknown"
          fi

          cat << EOF > release_notes.md
          <div align="center">
            <img src="https://readme-typing-svg.herokuapp.com?font=Fira+Code&weight=500&size=20&duration=3000&pause=1000&color=00FF99&center=true&vCenter=true&width=600&lines=KernelSU-Next+%2B+SUSFS+Release;Built+for+OnePlus+GKI+devices;Version+${{ env.NEW_TAG }};Maintained+by+sakfi" alt="Typing SVG" />
          </div>
          
          <div align="center">
          
          # 🔥 OnePlus Kernels Release 🔥
          
          [![Release](https://img.shields.io/badge/release-${{ env.NEW_TAG }}-blue?style=flat-square)](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ env.NEW_TAG }})
          [![Downloads](https://img.shields.io/github/downloads/${{ github.repository }}/${{ env.NEW_TAG }}/total?style=flat-square&color=green&label=downloads)](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ env.NEW_TAG }})
          [![Workflow](https://img.shields.io/badge/Workflow-Build--Kernel-orange?style=flat-square)](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          
          <br>
          
          > **📅 Build Date:** $(date -u '+%A, %d %B %Y') | **🆔 Build ID:** \`${{ github.run_id }}\`
          
          </div>
          
          ---
          
          <div align="center">
          
          ### 📦 Built Devices (${#device_info[@]} total)
          
          | Model | OS Version | Kernel Version | Features |
          | :--- | :--- | :--- | :--- |
          EOF
          
          for full_key in $(printf '%s\n' "${!device_info[@]}" | sort); do
            IFS='|' read -r model os_ver kernel_ver _ _ _ zipname <<< "${device_info[$full_key]}"
            
            android_ver=$(echo "$kernel_ver" | cut -d'-' -f1)
            os_ver_display="Android ${android_ver#android}"
            kernel_ver_display=$(echo "$kernel_ver" | cut -d'-' -f2)

            full_kv=$(echo "$kernel_ver" | sed 's/^[^-]*-//')
            possible_orig_model="${model}-${full_kv}"
            feature_flags=$(echo "$JSON_BUILD_DATA" | jq -r --arg MODEL "$model" --arg ORIG_MODEL "$possible_orig_model" --arg OS "$os_ver" '
              ([ .[] | select(.model == $ORIG_MODEL and .os_version == $OS) ][0]) //
              ([ .[] | select(.model == $MODEL      and .os_version == $OS) ][0]) |
              "\(.hmbird // false)\t\(.susfs // false)\t\(.bbr // false)\t\(.bbg // false)\t\(.ttl // false)\t\(.ip_set // false)\t\(.unicode // false)\t\(.ds // false)\t\(.ntsync // false)"
            ' | head -n 1)
            
            features=()
            if [[ -n "$feature_flags" ]]; then
              IFS=$'\t' read -r hmbird susfs bbr bbg ttl ip_set unicode ds ntsync <<< "$feature_flags"
              [[ "$hmbird" == "true" ]] && features+=("🐦 HMBIRD")
              [[ "$susfs" == "true" ]] && features+=("ඞ SusFS")
              [[ "$bbr" == "true" ]] && features+=("🚀 BBR")
              [[ "$bbg" == "true" ]] && features+=("🛡️ BBG")
              [[ "$ttl" == "true" ]] && features+=("🌐 TTL")
              [[ "$ip_set" == "true" ]] && features+=("🧱 IP_SET")
              [[ "$unicode" == "true" ]] && features+=("🔧 Unicode")
              [[ "$ds" == "true" ]] && features+=("💻 Droidspaces")
              [[ "$ntsync" == "true" ]] && features+=("🔃 NTSync")
            fi
            
            features_str=$(IFS=' '; echo "${features[*]:-N/A}")
            DOWNLOAD_URL="https://github.com/${REPO_OWNER}/${REPO_NAME}/releases/download/${NEW_TAG}/${zipname}.zip"
            printf "| [%s](%s) | %-10s | %-16s | %-48s |\n" "$model" "$DOWNLOAD_URL" "$os_ver_display" "$kernel_ver_display" "$features_str" >> release_notes.md
          done
          
          cat << EOF >> release_notes.md
          
          </div>
          
          ---
          
          <details>
          <summary><b>🔧 View Build Configuration</b></summary>
          
          | Component | Version/Setting |
          |-----------|----------------|
          | **KernelSU Next Branch** | \`${ksu_ref} (${ksu_resolved_hash:0:7})\` |
          | **KernelSU Next Version** | \`$ksu_ver_global\` |
          | **SUSFS Version** | \`$SUSFS_BASE_VERSION\` |
          | **Optimization Level** | \`$OPTIMIZE_LEVEL\` |
          | **Clean Build** | $( [ "$CLEAN_BUILD" = "true" ] && echo "✅ Yes" || echo "❌ No" ) |
          
          ### 📌 SUSFS Branch Mapping
          
          | Kernel Version | SUSFS Commit |
          |----------------|--------------|
          EOF
          
          for key in "${active_gki_keys[@]}"; do
            echo "| $key | \`${susfs_map[$key]:-unknown}\` |" >> release_notes.md
          done
          
          cat << 'EOF' >> release_notes.md
          </details>
          
          ---
          
          ## ✨ Features & Capabilities
          
          | 🏷️ Feature | 📝 Description |
          |:---|:---|
          | 🔐 **KernelSU-Next** | Next-generation kernel-level root solution |
          | 🥷 **SUSFS** | Advanced root hiding with Magic Mount support |
          | 💻 **Droidspaces** | SYSVIPC support for multi-instance app environments |
          | 🔃 **NTSync** | Fast wine synchronization primitives for emulation |
          | 🛠️ **Manual Hooks** | \`scope_min_manual_hooks_v1.4\` for better app compatibility |
          | 🖧 **BBR** | Improved TCP congestion control |
          | 🛡️ **BBG** | LSM-based Baseband Guard security |
          | 🌐 **TTL Target Support** | Network packet manipulation |
          | 🧱 **IP Set Support** | Advanced firewall capabilities |
          | 🏗️ **HMBIRD SCX** | Scheduler extensions for SM8750 devices |
          | ✅ **LTO** | Link Time Optimization |
          | ⚡️ **TMPFS XATTR** | Extended attributes for Mountify support |
          | 🚀 **Optimization** | Memory, I/O, CPU scheduler, network tuning patches |
          | 🔋 **Battery** | Multi-patch suite for power efficiency and wakelock reduction |
          | 🛂 **WireGuard** | Fast, modern, and secure kernel-level VPN |
          
          <br>
          
          <details>
          <summary><b>👀 View SUSFS Hide Capabilities</b></summary>
          
          - ✅ SUS_PATH · SUS_MOUNT · SUS_KSTAT · SUS_MAP
          - ✅ SPOOF_UNAME · SPOOF_CMDLINE · OPEN_REDIRECT · AVC_SPOOF
          </details>
          
          ---
          
          ## 📱 Manager Applications
          
          ### Official Manager
          - **KernelSU Next Manager**  
            → [GitHub](https://github.com/KernelSU-Next/KernelSU-Next)
          
          ### SusFS Module
          - **KSU SUSFS Module** (Required for SUSFS features)  
            → [GitHub Release](https://github.com/sidex15/ksu_module_susfs/releases)
          
          ### Recommended Flasher
          - **Kernel Flasher** (Recommended for flashing AnyKernel3 ZIPs, backups and OTA)  
            → [GitHub Release](https://github.com/fatalcoder524/KernelFlasher/releases)
          - **KSUN Built-in Flasher** (Alternative flasher)  
            → Accessible directly within the KernelSU Next Manager app
          
          ---
          
          ## 📥 Installation Instructions
          
          <details>
          <summary><b>🛠️ View Prerequisites</b></summary>
          
          - Unlocked bootloader.
          - Backup your current boot image.
          - Have root access using Magisk / KernelSU (Any forks) / Apatch.
          </details>
          
          ### Via Kernel Flasher
          1. Download the appropriate ZIP for your device from the Assets below.
          2. Flash the ZIP file using [Kernel Flasher](https://github.com/fatalcoder524/KernelFlasher) or [Horizon Kernel Flasher](https://github.com/libxzr/HorizonKernelFlasher).
          3. Reboot system.
          4. Install KernelSU-Next Manager (or KernelSU Manager depending on build).
          5. Install SUSFS module from manager.
          
          ---
          
          ## 📜 Changelog
          
          ### This Release
          EOF
          
          if [ -f "changelog.txt" ] && [ -s "changelog.txt" ]; then
            echo '```text' >> release_notes.md
            cat changelog.txt >> release_notes.md
            echo "" >> release_notes.md
            echo '```' >> release_notes.md
          elif [ -n "${{ inputs.custom_changelog }}" ]; then
            echo '```text' >> release_notes.md
            echo "${{ inputs.custom_changelog }}" >> release_notes.md
            echo '```' >> release_notes.md
          else
            PREV_TAG=$(gh api repos/$REPO_OWNER/$REPO_NAME/tags --jq '.[0].name' 2>/dev/null || true)
            echo '```text' >> release_notes.md
            if [ -n "$PREV_TAG" ]; then
              git log "$PREV_TAG..HEAD" --oneline --pretty=format:"- %s (%h)" >> release_notes.md
            else
              git log --oneline --pretty=format:"- %s (%h)" -n 15 >> release_notes.md
            fi
            echo "" >> release_notes.md
            echo '```' >> release_notes.md
          fi
          
          cat << 'EOF' >> release_notes.md
          
          ### Previous Releases
          See [Releases Page](https://github.com/sakfi/OP_KSUN_FS/releases)
          
          ---
          
          ## 🌟 Special Thanks
          
          These amazing people help make this project possible! ❤️
          
          <div align="center">
          
          | 🔧 Project/Role | 👨‍💻 Developer | 🔗 Link |
          |:---:|:---:|:---:|
          | **Original Repository** | fatalcoder524 | [![GitHub](https://img.shields.io/badge/GitHub-fatalcoder524-blue?style=flat-square&logo=github)](https://github.com/fatalcoder524) |
          | **KernelSU** | tiann | [![GitHub](https://img.shields.io/badge/GitHub-tiann-blue?style=flat-square&logo=github)](https://github.com/tiann/KernelSU) |
          | **KernelSU-Next** | rifsxd | [![GitHub](https://img.shields.io/badge/GitHub-rifsxd-blue?style=flat-square&logo=github)](https://github.com/KernelSU-Next/KernelSU-Next) |
          | **SUSFS** | simonpunk | [![GitLab](https://img.shields.io/badge/GitLab-simonpunk-orange?style=flat-square&logo=gitlab)](https://gitlab.com/simonpunk/susfs4ksu.git) |
          | **SUSFS Module** | sidex15 | [![GitHub](https://img.shields.io/badge/GitHub-sidex15-blue?style=flat-square&logo=github)](https://github.com/sidex15) |
          | **Optimization Patches** | backslashxx | [![GitHub](https://img.shields.io/badge/GitHub-backslashxx-blue?style=flat-square&logo=github)](https://github.com/backslashxx) |
          | **Optimization Patches** | liqideqq (Teemo) | [![GitHub](https://img.shields.io/badge/GitHub-liqideqq-blue?style=flat-square&logo=github)](https://github.com/liqideqq) |
          
          </div>
          
