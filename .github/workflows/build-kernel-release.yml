          **🚀 Built with ❤️ by [sakfi](https://github.com/sakfi)**
          
          </div>
          EOF
          
          echo "--- Final Release Notes Created ---"
          cat release_notes.md >> $GITHUB_STEP_SUMMARY
          echo "--- Final Release Notes ---"
          cat release_notes.md

      - name: 🚀 Create GitHub Release (Draft)
        run: |
          gh release create "${{ env.NEW_TAG }}" \
            --repo "${{ env.REPO_OWNER }}/${{ env.REPO_NAME }}" \
            --title "${{ env.RELEASE_NAME }}" \
            --notes-file release_notes.md \
            --draft

      - name: 📤 Upload Release Assets Dynamically
        run: |
          for file in ./downloaded-artifacts/*.zip; do
            if [ -f "$file" ]; then
              echo "Uploading $file..."
              gh release upload "${{ env.NEW_TAG }}" "$file" --clobber
            fi
          done

      - name: 📊 Release summary
        if: success()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          
          ---
          
          ## 📝 Release Created as DRAFT
          
          > [!IMPORTANT]
          > The release has been created as a **Draft**. Please review the changelog, make any manual edits, and then **Publish** it to make it public.
          
          **Draft URL:** [Edit Release](${{ github.server_url }}/${{ github.repository }}/releases/edit/${{ env.NEW_TAG }})  
          **Tag:** [\`${{ env.NEW_TAG }}\`](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ env.NEW_TAG }})  
          **Kernels:** $(find ./downloaded-artifacts -maxdepth 1 -name "*.zip" -type f | wc -l)
          
          ### 📦 Assets
          EOF
          
          for zip in ./downloaded-artifacts/*.zip; do
            if [ -f "$zip" ]; then
              name=$(basename "$zip")
              size=$(stat -c%s "$zip")
              size_mb=$(echo "scale=2; $size / 1024 / 1024" | bc)
              echo "- \`$name\` (${size_mb} MB)" >> $GITHUB_STEP_SUMMARY
            fi
          done

