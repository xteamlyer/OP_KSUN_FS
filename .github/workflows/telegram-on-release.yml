name: 📢 Telegram on Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to notify (e.g., v2.0.6)'
        required: false
        type: string
  workflow_call:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send message to Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GROUP_ID: ${{ secrets.TELEGRAM_GROUP }}
          CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL }}
          REL_NAME: ${{ github.event.release.name || '' }}
          REL_TAG: ${{ github.event.release.tag_name || github.event.inputs.release_tag || '' }}
          REL_URL: ${{ github.event.release.html_url || '' }}
          REL_BODY: ${{ github.event.release.body || '' }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Handle manual trigger or missing data
          if [ -z "$REL_NAME" ] && [ -n "$REL_TAG" ]; then
            echo "Manual trigger for tag: $REL_TAG"
            RELEASE_DATA=$(gh release view "$REL_TAG" --json name,body,url --repo "$REPO")
            REL_NAME=$(echo "$RELEASE_DATA" | jq -r .name)
            REL_BODY=$(echo "$RELEASE_DATA" | jq -r .body)
            REL_URL=$(echo "$RELEASE_DATA" | jq -r .url)
          fi

          if [ -z "$REL_TAG" ]; then
            echo "Error: No release tag provided and no release event data found."
            exit 1
          fi

          # Set message type
          EMOJI="🚀"
          STATUS="New Release Published"
          if [[ "${{ github.event.action }}" == "edited" ]]; then
            EMOJI="✏️"
            STATUS="Release Notes Updated"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            EMOJI="📢"
            STATUS="Manual Notification"
          fi

          # Extract only the commit changelog (lines starting with '- ')
          CLEAN_CHANGELOG=$(echo "$REL_BODY" | grep '^- ' | head -n 15 || echo "- Minor updates and under the hood improvements")
          if [[ ${#CLEAN_CHANGELOG} -gt 1500 ]]; then CLEAN_CHANGELOG="${CLEAN_CHANGELOG:0:1500}..."; fi

          # Build message (HTML formatted)
          MESSAGE=$(cat <<EOF
          <b>$EMOJI $STATUS</b>

          <pre><code class="language-markdown">Kernel Name: OnePlus Kernels with KSUN & SUSFS
          Version / Tag: $REL_TAG
          Title: $REL_NAME
          Device: Any supported OnePlus device (Check GitHub for your device)

          Features:
          - Variants:
            - KernelSU-Next
            - SUSFS (v2.1.0)
          - Optimized for performance and battery life (LTO, Memory, I/O)
          - Network features (TCP BBR, WireGuard, IP Set, TTL)
          - Advanced features (Droidspaces, NTSync, HMBIRD SCX)
          - Enhanced security (BBG, Manual Hooks v1.4)

          Changelog:
          $CLEAN_CHANGELOG</code></pre>

          <b>Important:</b>
          - Flash via Kernel Flasher (for KernelSU/Next) or FKM.
          - If you run into issues, please provide logs in the GitHub repository.
          - Support the development by leaving a 🌟 on GitHub!

          🔗 <a href="$REL_URL">Download Release on GitHub</a>
          EOF
          )

          send_telegram() {
            local chat_id="$1"
            if [ -n "$chat_id" ]; then
              echo "Sending to $chat_id..."
              curl -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
                --data-urlencode "chat_id=$chat_id" \
                --data-urlencode "text=$MESSAGE" \
                --data-urlencode "parse_mode=HTML" \
                -w "\n"
            else
              echo "Warning: Chat ID missing"
            fi
          }

          send_telegram "$GROUP_ID"
          send_telegram "$CHANNEL_ID"
