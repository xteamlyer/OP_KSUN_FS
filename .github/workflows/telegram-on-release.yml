name: 📢 Telegram on Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to notify (e.g., v2.0.6)'
        required: false
        type: string
  workflow_call:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: Send message to Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GROUP_ID: ${{ secrets.TELEGRAM_GROUP }}
          CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL }}
          REL_NAME: ${{ github.event.release.name || '' }}
          REL_TAG: ${{ github.event.release.tag_name || github.event.inputs.release_tag || '' }}
          REL_URL: ${{ github.event.release.html_url || '' }}
          REL_BODY: ${{ github.event.release.body || '' }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Handle manual trigger or missing data
          if [ -z "$REL_NAME" ] && [ -n "$REL_TAG" ]; then
            echo "Manual trigger for tag: $REL_TAG"
            RELEASE_DATA=$(gh release view "$REL_TAG" --json name,body,url --repo "$REPO")
            REL_NAME=$(echo "$RELEASE_DATA" | jq -r .name)
            REL_BODY=$(echo "$RELEASE_DATA" | jq -r .body)
            REL_URL=$(echo "$RELEASE_DATA" | jq -r .url)
          fi

          if [ -z "$REL_TAG" ]; then
            echo "Error: No release tag provided and no release event data found."
            exit 1
          fi

          # Set message type
          EMOJI="🚀"
          STATUS="New Release Published"
          if [[ "${{ github.event.action }}" == "edited" ]]; then
            EMOJI="✏️"
            STATUS="Release Notes Updated"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            EMOJI="📢"
            STATUS="Manual Notification"
          fi

          # ── Extract SUSFS version from release tag (e.g. v2.2.0-r1 → v2.2.0) ──
          SUSFS_VER=$(echo "$REL_TAG" | sed 's/-r[0-9]*$//')
          if [ -z "$SUSFS_VER" ]; then SUSFS_VER="latest"; fi

          # ── Extract Features from the release body ──
          # The release body has a "✨ Features & Capabilities" table with rows like:
          # | 🔐 **KernelSU-Next** | Next-generation kernel-level root solution |
          FEATURES_RAW=$(echo "$REL_BODY" | awk '
            /^## ✨ Features/ { flag=1; next }
            flag && /^\|:---/ { next }
            flag && /^\| .+\|/ {
              # Strip leading/trailing pipes and whitespace
              gsub(/^\| */, ""); gsub(/ *\| *$/, "")
              # Split by pipe separator
              split($0, parts, / *\| */)
              emoji_name = parts[1]
              desc = parts[2]
              # Remove bold markers
              gsub(/\*\*/, "", emoji_name)
              # Remove backtick markers
              gsub(/`/, "", emoji_name)
              printf "- %s: %s\n", emoji_name, desc
            }
            flag && /^---/ { flag=0 }
            flag && /^$/ { next }
            flag && /^</ { flag=0 }
          ')

          if [ -n "$FEATURES_RAW" ]; then
            # Group features into categories for a clean Telegram message
            VARIANTS=""
            NETWORK=""
            ADVANCED=""
            SECURITY=""
            OPTIMIZATION=""

            while IFS= read -r line; do
              case "$line" in
                *KernelSU*|*SUSFS*)
                  feat_name=$(echo "$line" | sed 's/^- [^ ]* //' | cut -d: -f1)
                  VARIANTS="${VARIANTS}    - ${feat_name}\n" ;;
                *BBR*|*WireGuard*|*TTL*|*IP.Set*)
                  feat_name=$(echo "$line" | sed 's/^- [^ ]* //' | cut -d: -f1)
                  NETWORK="${NETWORK}, ${feat_name}" ;;
                *Droidspaces*|*NTSync*|*HMBIRD*|*TMPFS*)
                  feat_name=$(echo "$line" | sed 's/^- [^ ]* //' | cut -d: -f1)
                  ADVANCED="${ADVANCED}, ${feat_name}" ;;
                *BBG*|*Manual.Hooks*|*Unicode*)
                  feat_name=$(echo "$line" | sed 's/^- [^ ]* //' | cut -d: -f1)
                  SECURITY="${SECURITY}, ${feat_name}" ;;
                *LTO*|*Optimization*|*Battery*)
                  feat_name=$(echo "$line" | sed 's/^- [^ ]* //' | cut -d: -f1)
                  OPTIMIZATION="${OPTIMIZATION}, ${feat_name}" ;;
              esac
            done <<< "$FEATURES_RAW"

            # Clean up leading commas/spaces
            NETWORK=$(echo "$NETWORK" | sed 's/^, //')
            ADVANCED=$(echo "$ADVANCED" | sed 's/^, //')
            SECURITY=$(echo "$SECURITY" | sed 's/^, //')
            OPTIMIZATION=$(echo "$OPTIMIZATION" | sed 's/^, //')

            FEATURES_BLOCK="Features:
          - Variants:
          $(echo -e "$VARIANTS" | sed '/^$/d')  - Optimized for performance and battery life (${OPTIMIZATION:-LTO, Battery, Optimization})
          - Network features (${NETWORK:-BBRv3, WireGuard, IP Set, TTL})
          - Advanced features (${ADVANCED:-Droidspaces, NTSync, HMBIRD SCX})
          - Enhanced security (${SECURITY:-BBG, Manual Hooks, Unicode Bypass Fix})"
          else
            # Fallback: hardcoded features if extraction fails
            FEATURES_BLOCK="Features:
          - Variants:
              - KernelSU-Next
              - SUSFS (${SUSFS_VER})
          - Optimized for performance and battery life (LTO, Memory, I/O)
          - Network features (TCP BBRv3, WireGuard, IP Set, TTL)
          - Advanced features (Droidspaces, NTSync, HMBIRD SCX)
          - Enhanced security (BBG, Manual Hooks v1.4)"
          fi

          # ── Changelog: read from changelog.txt (committed in repo) ──
          if [ -f "changelog.txt" ] && [ -s "changelog.txt" ]; then
            CLEAN_CHANGELOG=$(cat changelog.txt | head -n 15)
          else
            # Fallback: extract from release body under 'This Release'
            CLEAN_CHANGELOG=$(echo "$REL_BODY" | awk '/^### This Release/ {flag=1; next} /^### Previous Releases/ || /^---/ || /^## / {flag=0} flag && /^- /' | head -n 15)
          fi
          if [ -z "$CLEAN_CHANGELOG" ]; then CLEAN_CHANGELOG="- Minor updates and under the hood improvements"; fi
          if [[ ${#CLEAN_CHANGELOG} -gt 1500 ]]; then CLEAN_CHANGELOG="${CLEAN_CHANGELOG:0:1500}..."; fi

          # Build message (HTML formatted)
          MESSAGE=$(cat <<EOF
          <b>$EMOJI $STATUS</b>

          <pre><code class="language-markdown">Kernel Name: OnePlus Kernels with KSUN & SUSFS
          Version / Tag: $REL_TAG
          Title: $REL_NAME
          Device: Any supported OnePlus device (Check GitHub for your device)

          $FEATURES_BLOCK

          Changelog:
          $CLEAN_CHANGELOG</code></pre>

          <b>Important:</b>
          - Flash via Kernel Flasher (for KernelSU/Next) or FKM.
          - If you run into issues, please provide logs in the GitHub repository.
          - Support the development by leaving a 🌟 on GitHub!

          🔗 <a href="$REL_URL">Download Release on GitHub</a>
          EOF
          )

          send_telegram() {
            local chat_id="$1"
            if [ -n "$chat_id" ]; then
              echo "Sending to $chat_id..."
              curl -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
                --data-urlencode "chat_id=$chat_id" \
                --data-urlencode "text=$MESSAGE" \
                --data-urlencode "parse_mode=HTML" \
                -w "\n"
            else
              echo "Warning: Chat ID missing"
            fi
          }

          send_telegram "$GROUP_ID"
          send_telegram "$CHANNEL_ID"
